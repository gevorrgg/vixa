services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: video_service
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: node_app
    restart: always
    command: node src/app.js
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    env_file:
      - ../.env

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: node_worker
    restart: always
    command: node src/workers/avatarSqsWorker.js
    depends_on:
      - postgres
    env_file:
      - ../.env

volumes:
  pg_data: