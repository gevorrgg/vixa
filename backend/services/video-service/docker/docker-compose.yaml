services:
  user-service:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    image: docker-video-service
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"